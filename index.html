
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { padding: 1rem 0; font-family: var(--font-sans), system-ui, sans-serif; }
.eyebrow { font-size: 11px; letter-spacing: .18em; color: var(--color-text-secondary); text-transform: uppercase; margin-bottom: 6px; }
h1.plan-title { font-size: 22px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
h1.plan-title span { color: var(--color-text-info); }
.subtitle { font-size: 12px; color: var(--color-text-tertiary); }
.progress-row { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
.prog-bg { flex: 1; height: 3px; background: var(--color-border-tertiary); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--color-text-info); border-radius: 2px; transition: width .4s; }
.prog-label { font-size: 11px; color: var(--color-text-secondary); white-space: nowrap; min-width: 60px; text-align: right; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin: 1.2rem 0 1rem; padding: 10px 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
.nav-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 5px 14px; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: background .15s; }
.nav-btn:hover:not(:disabled) { background: var(--color-background-primary); color: var(--color-text-primary); }
.nav-btn:disabled { opacity: .3; cursor: default; }
.month-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.month-meta { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; text-align: center; }
.week-block { margin-bottom: 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
.week-block.complete { border-color: var(--color-border-success); }
.week-hdr { display: flex; justify-content: space-between; align-items: center; padding: 7px 14px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); gap: 8px; }
.week-name { font-size: 12px; font-weight: 500; color: var(--color-text-primary); }
.week-right { display: flex; align-items: center; gap: 8px; }
.week-cnt { font-size: 11px; color: var(--color-text-secondary); }
.week-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }
.week-badge.done { background: var(--color-background-success); color: var(--color-text-success); border-color: var(--color-border-success); }
.week-badge.race { background: var(--color-background-warning); color: var(--color-text-warning); border-color: var(--color-border-warning); }
.days-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); background: var(--color-background-primary); }
.day-col { border-right: 0.5px solid var(--color-border-tertiary); }
.day-col:last-child { border-right: none; }
.day-lbl { font-size: 10px; color: var(--color-text-tertiary); padding: 6px 9px 4px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.day-body { padding: 9px; display: flex; flex-direction: column; gap: 7px; min-height: 105px; }
.day-body.done-bg { background: var(--color-background-success); }
.day-body.race-bg { background: var(--color-background-warning); }
.day-txt { font-size: 12px; line-height: 1.55; color: var(--color-text-primary); flex: 1; border-radius: 4px; transition: background .15s; }
.day-txt.rest { color: var(--color-text-tertiary); font-style: italic; }
.day-txt.done-text { color: var(--color-text-secondary); text-decoration: line-through; text-decoration-color: var(--color-border-secondary); }
.day-txt.race-text { color: var(--color-text-warning); font-weight: 500; }
[contenteditable="true"] { outline: none; cursor: text; }
[contenteditable="true"]:hover { background: var(--color-background-secondary); }
[contenteditable="true"]:focus { background: var(--color-background-secondary); box-shadow: 0 0 0 1.5px var(--color-border-info); }
.btn-row { display: flex; gap: 4px; }
.mark-btn { flex: 1; padding: 5px 0; font-size: 10px; cursor: pointer; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); transition: all .15s; }
.mark-btn:hover:not([disabled]):not(.done-state) { border-color: var(--color-border-success); color: var(--color-text-success); background: var(--color-background-success); }
.mark-btn.done-state { border-color: var(--color-border-success); color: var(--color-text-success); background: var(--color-background-success); }
.undo-btn { padding: 5px 7px; font-size: 12px; cursor: pointer; border-radius: var(--border-radius-md); border: 0.5px solid transparent; background: transparent; color: var(--color-text-tertiary); transition: all .15s; }
.undo-btn:hover { border-color: var(--color-border-secondary); color: var(--color-text-secondary); }
.banner { display: none; margin-top: 1rem; padding: 1.25rem; border: 0.5px solid var(--color-border-success); background: var(--color-background-success); border-radius: var(--border-radius-lg); text-align: center; }
.banner.show { display: block; }
.banner p { font-size: 11px; color: var(--color-text-success); letter-spacing: .15em; text-transform: uppercase; }
.banner h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-top: 4px; }
footer { margin-top: 1.2rem; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); font-size: 11px; color: var(--color-text-tertiary); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
@media(max-width:600px){
  .days-grid{grid-template-columns:1fr}
  .day-col{border-right:none;border-bottom:0.5px solid var(--color-border-tertiary)}
  .day-col:last-child{border-bottom:none}
  .day-body{min-height:unset;flex-direction:row;align-items:center}
}
</style>

<div class="wrap">
<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">越野跑备赛训练计划，下周一至今年12月31日</h2>

<div>
  <div class="eyebrow">训练计划</div>
  <h1 class="plan-title">越野跑 <span>20 km 备赛</span></h1>
  <div class="subtitle">TRAIL RUNNING · PROGRESSIVE WEEKLY PLAN · TO DEC 31</div>
  <div class="progress-row">
    <div class="prog-bg"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
    <div class="prog-label" id="pLabel">0 / 0</div>
  </div>
</div>

<div class="month-nav">
  <button class="nav-btn" id="prevBtn" onclick="changeMonth(-1)">← 上月</button>
  <div style="text-align:center">
    <div class="month-title" id="monthTitle"></div>
    <div class="month-meta" id="monthMeta"></div>
  </div>
  <button class="nav-btn" id="nextBtn" onclick="changeMonth(1)">下月 →</button>
</div>

<div id="monthContainer"></div>

<div class="banner" id="doneBanner">
  <p>全部完成</p>
  <h2>准备好出发了！</h2>
</div>

<footer>
  <span>点击训练内容可直接编辑 · 进度自动保存在浏览器</span>
  <span id="footerKm"></span>
</footer>
</div>

<script>
(function(){

const today = new Date();
today.setHours(0,0,0,0);
const dow = today.getDay();
const daysToMon = dow === 0 ? 1 : (8 - dow);
const START = new Date(today);
START.setDate(START.getDate() + daysToMon);

const RACE = new Date(today.getFullYear(), 11, 31);

function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }

const WD = ['一','二','三','四','五','六','日'];
const MN = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

const TMPLS = [
  ['骑车 60 min 或休息','力量训练','{R} km 轻松跑','力量训练','{R2} km + 坡跑 4×40s','{L} km 越野慢跑','3 km 恢复跑'],
  ['休息 或 力量训练','{R} km 跑 或 骑车 60 min','力量训练','{R} km 越野跑','休息 或 力量训练','{L} km 越野长距离','4 km 恢复跑'],
  ['休息 或 力量训练','{R} km 跑 + 坡跑 6×40s','力量训练','{R2} km 越野跑','休息 或 力量训练','{L} km 越野长距离','4 km 恢复跑'],
  ['休息 或 力量训练','{R} km 骑车 60 min','力量训练','{R} km 越野跑','休息 或 力量训练','{L} km 越野长距离','4 km 恢复跑'],
];

function buildPlan(){
  const weeks = [];
  let d = new Date(START);
  let wkm = 15;
  let wi = 0;
  while(d <= RACE){
    const wend = addDays(d,6);
    const tpl = TMPLS[wi%4];
    const r = Math.max(3, Math.round(wkm*0.2));
    const r2 = Math.max(4, Math.round(wkm*0.25));
    const l = Math.max(5, Math.round(wkm*0.4));
    const isRW = wend >= RACE;
    const days = [];
    for(let i=0;i<7;i++){
      const dd = addDays(d,i);
      if(dd > RACE) break;
      let text = tpl[i].replace(/{R2}/g,r2).replace(/{R}/g,r).replace(/{L}/g,l);
      const isRaceDay = dd.toDateString()===RACE.toDateString();
      const isRest = /^休息$/.test(text.trim());
      if(isRW){
        if(isRaceDay){ text='比赛日 20 km'; }
        else if(i===1){ text='6 km 轻松跑'; }
        else if(i===2){ text='4 km 慢跑'; }
        else if(i===4){ text='3 km 激活跑'; }
        else if(!isRaceDay){ text='休息'; }
      }
      days.push({ date:new Date(dd), label:'周'+WD[i], text, rest:/^休息$/.test(text.trim()), race:isRaceDay });
    }
    weeks.push({ startDate:new Date(d), days, weekKm:Math.round(wkm), isRaceWeek:isRW });
    if(!isRW){
      if((wi+1)%4===3) wkm=Math.round(wkm*0.85);
      else wkm=Math.min(60, Math.round(wkm*1.08));
    }
    wi++;
    d=addDays(d,7);
  }
  return weeks;
}

const allWeeks = buildPlan();

const months = [];
let cur = null;
allWeeks.forEach(w=>{
  const key = w.startDate.getFullYear()+'-'+w.startDate.getMonth();
  if(!cur||cur.key!==key){
    cur={key, month:w.startDate.getMonth(), year:w.startDate.getFullYear(), weeks:[]};
    months.push(cur);
  }
  cur.weeks.push(w);
});

let mIdx = 0;

function sk(date){ return 'tr20_'+date.toISOString().slice(0,10); }
function tk(date){ return 'tr20t_'+date.toISOString().slice(0,10); }
function isDone(d){ try{ return localStorage.getItem(sk(d))==='1'; }catch(e){ return false; } }
function setDone(d,v){ try{ v?localStorage.setItem(sk(d),'1'):localStorage.removeItem(sk(d)); }catch(e){} }
function getText(d){ try{ return localStorage.getItem(tk(d)); }catch(e){ return null; } }
function saveText(d,t){ try{ localStorage.setItem(tk(d),t); }catch(e){} }

function countAll(){
  let total=0,done=0;
  allWeeks.forEach(w=>w.days.forEach(d=>{ if(!d.rest){total++;if(isDone(d.date))done++;} }));
  return {total,done};
}

function updateProgress(){
  const {total,done}=countAll();
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pLabel').textContent=done+' / '+total;
  const b=document.getElementById('doneBanner');
  done===total&&total>0?b.classList.add('show'):b.classList.remove('show');
}

function renderMonth(){
  const md=months[mIdx];
  document.getElementById('monthTitle').textContent=md.year+'年 '+MN[md.month];
  document.getElementById('prevBtn').disabled=mIdx===0;
  document.getElementById('nextBtn').disabled=mIdx===months.length-1;

  const totalKm=md.weeks.reduce((s,w)=>s+w.weekKm,0);
  document.getElementById('monthMeta').textContent='共 '+md.weeks.length+' 周 · 计划约 '+totalKm+' km';
  document.getElementById('footerKm').textContent='本月计划跑量约 '+totalKm+' km';

  const cont=document.getElementById('monthContainer');
  cont.innerHTML='';

  md.weeks.forEach((week,wi)=>{
    const wDone=week.days.filter(d=>!d.rest&&isDone(d.date)).length;
    const wTotal=week.days.filter(d=>!d.rest).length;
    const allDone=wDone===wTotal;
    const fmt=d=>(d.getMonth()+1)+'/'+(d.getDate());
    const de=week.days[week.days.length-1].date;

    const badge=week.isRaceWeek?'<span class="week-badge race">比赛周</span>'
      :allDone?'<span class="week-badge done">✓ 完成</span>'
      :'<span class="week-badge">'+week.weekKm+' km</span>';

    const wEl=document.createElement('div');
    wEl.className='week-block'+(allDone?' complete':'');
    wEl.innerHTML=`<div class="week-hdr">
      <span class="week-name">${fmt(week.startDate)} – ${fmt(de)}</span>
      <div class="week-right"><span class="week-cnt">${wDone}/${wTotal}</span>${badge}</div>
    </div><div class="days-grid" id="g${wi}"></div>`;
    cont.appendChild(wEl);

    const grid=wEl.querySelector('#g'+wi);
    week.days.forEach(day=>{
      const done=!day.rest&&isDone(day.date);
      const savedTxt=getText(day.date)||day.text;
      const col=document.createElement('div');
      col.className='day-col';
      col.id='c'+day.date.toISOString().slice(0,10);

      let bodyC='day-body'+(done?' done-bg':day.race?' race-bg':'');
      let txtC='day-txt'+(day.rest?' rest':done?' done-text':day.race?' race-text':'');

      const dateStr=day.date.toISOString();
      let btnH='';
      if(day.rest){
        btnH='<button class="mark-btn" style="opacity:.25;cursor:default" disabled>休息</button>';
      } else {
        btnH=`<div class="btn-row">
          <button class="mark-btn${done?' done-state':''}" data-d="${dateStr}">${done?'已完成':'完成'}</button>
          ${done?`<button class="undo-btn" data-d="${dateStr}">↩</button>`:''}
        </div>`;
      }

      col.innerHTML=`<div class="day-lbl">${day.label} · ${(day.date.getMonth()+1)}/${day.date.getDate()}</div>
        <div class="${bodyC}">
          <div class="${txtC}" contenteditable="${day.rest?'false':'true'}" data-d="${dateStr}">${savedTxt}</div>
          ${btnH}
        </div>`;
      grid.appendChild(col);
    });
  });

  cont.querySelectorAll('[contenteditable="true"]').forEach(el=>{
    el.addEventListener('blur',function(){ saveText(new Date(this.dataset.d), this.textContent.trim()); });
    el.addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();this.blur();} });
  });
  cont.querySelectorAll('.mark-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',function(){ setDone(new Date(this.dataset.d),true); renderMonth(); updateProgress(); });
  });
  cont.querySelectorAll('.undo-btn').forEach(btn=>{
    btn.addEventListener('click',function(){ setDone(new Date(this.dataset.d),false); renderMonth(); updateProgress(); });
  });

  updateProgress();
}

window.changeMonth=function(dir){ mIdx=Math.max(0,Math.min(months.length-1,mIdx+dir)); renderMonth(); };
renderMonth();
})();
</script>
